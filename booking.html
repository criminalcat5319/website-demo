<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script defer src="script.js"></script>
</head>

<body>

<div class="container mt-5">
  <h3>Booking Form</h3>

  <form onsubmit="return bookingValidation()">

    <input type="text" id="name" placeholder="Name" class="form-control mb-2">
    <input type="email" id="email2" placeholder="Email" class="form-control mb-2">

    <label>Gender:</label><br>
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <br><br>

    <label>Days:</label>
    <input type="range" min="1" max="10" id="days" class="form-range">

    <button type="submit" class="btn btn-success mt-3">Submit</button>
  </form>

</div>

</body>
</html>
